<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0e1116" />
<title>MusicBox</title>
<style>
  :root {
    --bg: #0e1116;
    --bg-elev: #161b22;
    --bg-elev-2: #1f2630;
    --border: #2a323d;
    --text: #e6edf3;
    --text-dim: #9aa7b4;
    --accent: #4f9dff;
    --accent-press: #3b82e6;
    --danger: #ff6b6b;
    --ok: #3fb950;
    --warn: #f0a020;
    --radius: 14px;
    --tabbar-h: 60px;
    --header-h: 56px;
    --side-w: 264px;
    --safe-b: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 16px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  button { font: inherit; color: inherit; cursor: pointer; border: none; background: none; }
  a { color: var(--accent); }

  .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 12px var(--accent); flex: 0 0 auto; }

  .app {
    display: grid;
    grid-template-rows: var(--header-h) 1fr auto;
    height: 100dvh;
    height: 100vh;
  }

  /* ---------- Sidebar / drawer ---------- */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0; width: var(--side-w); z-index: 60;
    background: var(--bg-elev); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
    transform: translateX(-100%); transition: transform .22s ease;
  }
  .sidebar.open { transform: translateX(0); }
  .s-head { padding: 16px; font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-elev); }
  .s-nav { padding: 8px; display: flex; flex-direction: column; gap: 2px; }
  .s-item { display: flex; align-items: center; gap: 12px; padding: 11px 12px; border-radius: 10px; color: var(--text-dim); text-align: left; width: 100%; font-size: 14px; }
  .s-item .si-ic { font-size: 20px; width: 24px; text-align: center; flex: 0 0 auto; }
  .s-item .si-label { flex: 1; line-height: 1.25; }
  .s-item .si-soon { flex: 0 0 auto; font-size: 9px; padding: 2px 6px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-dim); text-transform: uppercase; letter-spacing: .04em; }
  .s-item:active { background: var(--bg-elev-2); }
  .s-item.active { background: var(--bg-elev-2); color: var(--text); }
  .s-item.active .si-ic { color: var(--accent); }

  .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 55; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .scrim.show { opacity: 1; pointer-events: auto; }

  /* Header */
  header.topbar {
    display: flex; align-items: center; gap: 12px;
    padding: 0 14px;
    background: var(--bg-elev);
    border-bottom: 1px solid var(--border);
  }
  .hamb { display: grid; place-items: center; width: 38px; height: 38px; margin-left: -6px; border-radius: 10px; font-size: 22px; color: var(--text); flex: 0 0 auto; }
  .hamb:active { background: var(--bg-elev-2); }
  .section-title { font-weight: 700; font-size: 17px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .topbar .grow { flex: 1; }
  .stat-pill {
    font-size: 12px; color: var(--text-dim);
    background: var(--bg-elev-2); border: 1px solid var(--border);
    padding: 5px 10px; border-radius: 999px; white-space: nowrap;
  }

  /* Views container */
  main.content { position: relative; overflow: hidden; }
  .view { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px calc(14px + var(--safe-b)); display: none; }
  .view.active { display: block; }
  .view h2 { margin: 4px 2px 12px; font-size: 15px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }

  /* Search */
  .search-wrap { position: sticky; top: -14px; background: var(--bg); padding: 14px 0 10px; margin-top: -14px; z-index: 5; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elev-2); border: 1px solid var(--border);
    border-radius: 12px; padding: 0 12px;
  }
  .search input {
    flex: 1; background: none; border: none; outline: none; color: var(--text);
    padding: 12px 0; font-size: 16px;
  }
  .search .clear { color: var(--text-dim); padding: 6px; display: none; }
  .search.has-value .clear { display: block; }

  /* Track list */
  .tracklist { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 6px; }
  .track {
    display: flex; align-items: center; gap: 12px;
    background: var(--bg-elev); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
  }
  .track.playing { border-color: var(--accent); }
  .track .play {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
    background: var(--bg-elev-2); display: grid; place-items: center; font-size: 16px;
  }
  .track.playing .play { background: var(--accent); color: #07101e; }
  .track .meta { flex: 1; min-width: 0; }
  .track .t { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track .s { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track .info { flex: 0 0 auto; width: 36px; height: 36px; border-radius: 10px; color: var(--text-dim); display: grid; place-items: center; }
  .track .info:active { background: var(--bg-elev-2); }

  .pager { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 16px 2px calc(20px + var(--safe-b)); }
  .pager .range { font-size: 13px; color: var(--text-dim); }
  .btn {
    background: var(--bg-elev-2); border: 1px solid var(--border);
    padding: 10px 16px; border-radius: 10px; font-weight: 600;
  }
  .btn:disabled { opacity: .4; }
  .btn.primary { background: var(--accent); color: #07101e; border-color: transparent; }
  .btn.primary:active { background: var(--accent-press); }

  .empty { text-align: center; color: var(--text-dim); padding: 48px 20px; }
  .empty .big { font-size: 38px; margin-bottom: 8px; }
  .empty code { background: var(--bg-elev-2); padding: 2px 6px; border-radius: 6px; color: var(--text); font-size: 13px; }
  .spinner { display: inline-block; width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Player */
  .player-full { display: flex; flex-direction: column; align-items: center; gap: 18px; padding-top: 8px; }
  .art {
    width: min(70vw, 280px); aspect-ratio: 1; border-radius: 20px;
    background: linear-gradient(135deg, var(--bg-elev-2), #2b3a52);
    display: grid; place-items: center; font-size: 64px; color: #51607a;
    border: 1px solid var(--border);
  }
  .now { text-align: center; width: 100%; padding: 0 8px; }
  .now .t { font-size: 20px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .now .s { color: var(--text-dim); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .progress { width: 100%; max-width: 460px; }
  .seek { width: 100%; -webkit-appearance: none; appearance: none; height: 6px; border-radius: 3px; background: var(--bg-elev-2); outline: none; }
  .seek::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: var(--accent); }
  .seek::-moz-range-thumb { width: 16px; height: 16px; border: none; border-radius: 50%; background: var(--accent); }
  .times { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 26px; }
  .controls .ctl { width: 52px; height: 52px; display: grid; place-items: center; font-size: 24px; border-radius: 50%; }
  .controls .ctl.big { width: 72px; height: 72px; background: var(--accent); color: #07101e; font-size: 30px; }
  .controls .ctl.big:active { background: var(--accent-press); }
  .controls .ctl:disabled { opacity: .35; }

  /* Detail */
  .detail .card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 14px; }
  .detail .card h3 { margin: 0 0 12px; font-size: 14px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); }
  .kv { display: grid; grid-template-columns: 96px 1fr; gap: 6px 12px; font-size: 14px; }
  .kv dt { color: var(--text-dim); }
  .kv dd { margin: 0; word-break: break-word; }
  .discogs-result { display: flex; gap: 12px; align-items: flex-start; }
  .discogs-result img { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; background: var(--bg-elev-2); }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text-dim); }
  .note { font-size: 13px; color: var(--text-dim); }
  .note.err { color: var(--danger); }

  /* Placeholder "Próximamente" */
  .placeholder { text-align: center; padding: 52px 20px; max-width: 540px; margin: 0 auto; }
  .placeholder .ph-ic { font-size: 64px; margin-bottom: 16px; }
  .placeholder h2 { font-size: 22px; margin: 0 0 10px; text-transform: none; letter-spacing: 0; color: var(--text); }
  .placeholder p { color: var(--text-dim); font-size: 15px; line-height: 1.55; margin: 0 auto; }
  .ph-badge { display: inline-block; margin-top: 20px; font-size: 12px; padding: 7px 16px; border-radius: 999px; border: 1px solid var(--accent); color: var(--accent); font-weight: 700; letter-spacing: .04em; }
  .ph-badge.dev { border-color: var(--warn); color: var(--warn); }

  /* Discogs screen */
  .dsearch-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .dsearch-row .search { flex: 1; }
  .screen h3 { font-size: 14px; text-transform: uppercase; letter-spacing: .06em; color: var(--text-dim); margin: 22px 2px 10px; }
  .dresult, .dmatch { background: var(--bg-elev); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; }
  .dresult { display: flex; gap: 12px; align-items: flex-start; }
  .dresult img { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; background: var(--bg-elev-2); flex: 0 0 auto; }
  .dresult .t, .dmatch .t { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ---------- Cabina DJ (inspirada en Rane Performer) ---------- */
  .dj { display: flex; flex-direction: column; gap: 14px; min-height: 100%; }
  .dj-top { display: flex; align-items: center; gap: 12px; }
  .dj-top .grow { flex: 1; }
  .dj-brand { font-weight: 800; font-size: 18px; display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .dj-brand .dj-sub { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .dj-note { text-align: center; color: var(--text-dim); font-size: 12px; margin: 4px 0 2px; }
  .dj-rig { display: flex; flex-direction: column; gap: 14px; }
  .dj-panel { background: linear-gradient(180deg, #11161d, #0c1015); border: 1px solid var(--border); border-radius: 16px; padding: 14px; box-shadow: inset 0 1px 0 rgba(255,255,255,.03); }
  .dj-panel .ph-h { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 12px; text-align: center; }

  .deck { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .jog { width: 150px; height: 150px; border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, #2a3340, #11161d 70%);
    border: 6px solid #0a0d12; box-shadow: 0 0 0 2px var(--border), 0 8px 24px rgba(0,0,0,.5);
    display: grid; place-items: center; position: relative; }
  .jog::before { content: ""; position: absolute; inset: 14px; border-radius: 50%; border: 1px dashed #34404f; }
  .jog .jc { width: 56px; height: 56px; border-radius: 50%; background: var(--bg-elev-2); border: 1px solid var(--border); display: grid; place-items: center; font-weight: 800; color: var(--accent); }
  .deck-meta { text-align: center; }
  .deck-meta .dm-t { font-weight: 600; font-size: 13px; max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deck-meta .dm-bpm { font-size: 12px; color: var(--accent); font-variant-numeric: tabular-nums; }
  .deck-tr { display: flex; gap: 10px; }
  .tr-btn { width: 64px; height: 42px; border-radius: 10px; background: var(--bg-elev-2); border: 1px solid var(--border); font-weight: 700; font-size: 13px; color: var(--text); }
  .tr-btn.cue { color: var(--warn); }
  .tr-btn.cue.flash { background: var(--warn); color: #07101e; }
  .tr-btn.play.on { background: var(--ok); color: #07101e; border-color: transparent; }

  .knob-row { display: flex; justify-content: center; gap: 14px; }
  .knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 9px; letter-spacing: .08em; color: var(--text-dim); text-transform: uppercase; }
  .knob { width: 38px; height: 38px; border-radius: 50%; background: radial-gradient(circle at 50% 32%, #3a4655, #161b22); border: 1px solid #0a0d12; box-shadow: 0 2px 6px rgba(0,0,0,.45); position: relative; }
  .knob::after { content: ""; position: absolute; left: 50%; top: 5px; width: 2px; height: 12px; background: var(--accent); transform: translateX(-50%); border-radius: 2px; }

  .fader { -webkit-appearance: slider-vertical; appearance: slider-vertical; writing-mode: vertical-lr; direction: rtl; width: 12px; height: 116px; background: var(--bg-elev-2); border-radius: 6px; outline: none; }
  .fader::-webkit-slider-thumb { -webkit-appearance: none; width: 28px; height: 14px; border-radius: 4px; background: var(--accent); }
  .fader::-moz-range-thumb { width: 28px; height: 14px; border: none; border-radius: 4px; background: var(--accent); }

  .mx-chs { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .mx-ch { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 8px 2px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px; }
  .mx-ch .ch-n { font-size: 10px; color: var(--text-dim); letter-spacing: .06em; }
  .mx-cross { display: flex; flex-direction: column; align-items: center; gap: 6px; margin: 16px 0 4px; }
  .mx-label { font-size: 10px; color: var(--text-dim); letter-spacing: .12em; }
  .crossfader { width: 100%; max-width: 340px; -webkit-appearance: none; appearance: none; height: 12px; border-radius: 6px; background: var(--bg-elev-2); outline: none; }
  .crossfader::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 28px; border-radius: 5px; background: var(--accent); }
  .crossfader::-moz-range-thumb { width: 24px; height: 28px; border: none; border-radius: 5px; background: var(--accent); }

  .pads { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .pad { aspect-ratio: 1; border-radius: 10px; background: var(--bg-elev-2); border: 1px solid var(--border); font-size: 10px; color: var(--text-dim); display: grid; place-items: center; }
  .pad.on { background: var(--accent); color: #07101e; border-color: transparent; box-shadow: 0 0 14px rgba(79,157,255,.5); }
  .fx-row { display: flex; justify-content: center; gap: 18px; }

  .dj:fullscreen { background: var(--bg); padding: 18px; overflow: auto; }

  @media (min-width: 760px) and (orientation: landscape), (min-width: 900px) {
    .dj-rig { flex-direction: row; align-items: stretch; }
    .dj-rig > .deck { flex: 1; }
    .dj-rig > .dj-mixer { flex: 1.5; }
  }

  /* Mini player */
  .miniplayer {
    display: none; align-items: center; gap: 12px;
    background: var(--bg-elev); border-top: 1px solid var(--border);
    padding: 8px 14px; position: relative;
  }
  .miniplayer.show { display: flex; }
  .miniplayer .mp-art { width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, var(--bg-elev-2), #2b3a52); display: grid; place-items: center; color: #51607a; }
  .miniplayer .mp-meta { flex: 1; min-width: 0; }
  .miniplayer .mp-meta .t { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .miniplayer .mp-meta .s { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .miniplayer .mp-btn { width: 40px; height: 40px; display: grid; place-items: center; font-size: 20px; }
  .miniplayer .mp-bar { position: absolute; left: 0; right: 0; top: 0; height: 2px; background: var(--bg-elev-2); }
  .miniplayer .mp-bar > span { display: block; height: 100%; width: 0; background: var(--accent); }

  /* Bottom tab bar (solo dentro de Biblioteca, en móvil) */
  nav.tabbar {
    display: flex; background: var(--bg-elev); border-top: 1px solid var(--border);
    padding-bottom: var(--safe-b); height: calc(var(--tabbar-h) + var(--safe-b));
  }
  nav.tabbar button {
    flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px;
    color: var(--text-dim); font-size: 11px; height: var(--tabbar-h);
  }
  nav.tabbar button .ic { font-size: 22px; line-height: 1; }
  nav.tabbar button.active { color: var(--accent); }

  /* Cuando hay una sección que no es Biblioteca, ocultamos las tabs internas */
  .app.other nav.tabbar { display: none; }

  /* ---- Tablet / landscape: sidebar fija + dos paneles ---- */
  @media (min-width: 760px) and (orientation: landscape), (min-width: 900px) {
    .sidebar { transform: none; }
    .scrim { display: none; }
    .hamb { display: none; }
    .app { padding-left: var(--side-w); }

    .app:not(.other) { grid-template-columns: minmax(320px, 1fr) minmax(360px, 1.05fr); grid-template-rows: var(--header-h) 1fr auto; }
    header.topbar { grid-column: 1 / -1; }
    .app:not(.other) main.content { grid-column: 1 / 2; border-right: 1px solid var(--border); }
    .right-pane { grid-column: 2 / 3; grid-row: 2 / 3; overflow-y: auto; padding: 14px; display: block; }
    .miniplayer { grid-column: 1 / -1; }
    nav.tabbar { display: none; }
    .app:not(.other) #view-library { display: block !important; position: absolute; }
    #view-player, #view-detail { display: none !important; }
    .right-pane .pane-block { margin-bottom: 22px; }
    .right-pane .pane-block h2 { margin: 2px 2px 12px; font-size: 15px; text-transform: uppercase; letter-spacing: .08em; color: var(--text-dim); }

    /* Sección distinta de Biblioteca: una sola columna a ancho completo */
    .app.other { grid-template-columns: 1fr; }
    .app.other main.content { grid-column: 1 / -1; border-right: none; }
    .app.other .right-pane { display: none !important; }
    .app.other #view-library { display: none !important; }
  }
  /* On narrow layout, the right pane is not used */
  .right-pane { display: none; }
</style>
</head>
<body>
<div class="scrim" id="scrim"></div>
<aside class="sidebar" id="sidebar">
  <div class="s-head"><span class="dot"></span> MusicBox</div>
  <nav class="s-nav" id="sideNav"></nav>
</aside>

<div class="app" id="app">
  <header class="topbar">
    <button class="hamb" id="hamb" aria-label="Abrir menú">☰</button>
    <div class="section-title" id="sectionTitle">Biblioteca musical</div>
    <div class="grow"></div>
    <span class="stat-pill" id="stat">…</span>
  </header>

  <main class="content">
    <!-- BIBLIOTECA -->
    <section class="view active" id="view-library">
      <div class="search-wrap">
        <div class="search" id="searchBox">
          <span aria-hidden="true">🔍</span>
          <input id="q" type="search" inputmode="search" placeholder="Buscar por título, artista o álbum…" autocomplete="off" />
          <button class="clear" id="clearQ" aria-label="Limpiar">✕</button>
        </div>
      </div>
      <ul class="tracklist" id="list"></ul>
      <div id="listState"></div>
      <div class="pager" id="pager" hidden>
        <button class="btn" id="prev">‹ Anterior</button>
        <span class="range" id="range"></span>
        <button class="btn" id="next">Siguiente ›</button>
      </div>
    </section>

    <!-- REPRODUCTOR (narrow) -->
    <section class="view" id="view-player">
      <div class="player-full" id="playerFull"></div>
    </section>

    <!-- DETALLE (narrow) -->
    <section class="view" id="view-detail">
      <div class="detail" id="detailBody"></div>
    </section>

    <!-- OTRAS SECCIONES (Discogs + placeholders) -->
    <section class="view" id="otherView"></section>
  </main>

  <!-- Right pane used only on tablet/landscape (Biblioteca) -->
  <aside class="right-pane" id="rightPane">
    <div class="pane-block"><h2>Reproductor</h2><div class="player-full" id="playerFull2"></div></div>
    <div class="pane-block"><h2>Detalle</h2><div class="detail" id="detailBody2"></div></div>
  </aside>

  <!-- MINI PLAYER -->
  <div class="miniplayer" id="mini">
    <div class="mp-bar"><span id="miniBar"></span></div>
    <div class="mp-art">♪</div>
    <div class="mp-meta"><div class="t" id="miniT">—</div><div class="s" id="miniS"></div></div>
    <button class="mp-btn" id="miniPrev" aria-label="Anterior">⏮</button>
    <button class="mp-btn" id="miniPlay" aria-label="Play/Pausa">▶</button>
    <button class="mp-btn" id="miniNext" aria-label="Siguiente">⏭</button>
  </div>

  <nav class="tabbar">
    <button data-view="library" class="active"><span class="ic">≣</span>Biblioteca</button>
    <button data-view="player"><span class="ic">♪</span>Reproductor</button>
    <button data-view="detail"><span class="ic">ⓘ</span>Detalle</button>
  </nav>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
"use strict";
const API = "";
const LIMIT = 50;

const state = {
  q: "", offset: 0, total: 0, indexed: true,
  tracks: [], current: -1, selected: null, loading: false,
};

const $ = (s) => document.querySelector(s);
const audio = $("#audio");
const app = $("#app");

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function fmtTime(sec) {
  if (sec == null || isNaN(sec) || sec < 0) return "0:00";
  sec = Math.floor(sec);
  const m = Math.floor(sec / 60), s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}
function trackTitle(t) { return t.title || t.filename || "(sin título)"; }
function trackSub(t) {
  const parts = [t.artist, t.album].filter(Boolean);
  return parts.join(" · ") || t.folder || t.extension || "";
}

/* ---------- Secciones (visión completa) ---------- */
const SECTIONS = [
  { id: "biblioteca", label: "Biblioteca musical", icon: "≣" },
  { id: "convertidor", label: "Convertidor a WAV", icon: "🎚️", soon: true, sub: "Convierte tu biblioteca a un único estándar de alta calidad (WAV sin pérdidas) con ffmpeg." },
  { id: "organizador", label: "Organizador para cualquier dispositivo", icon: "🗂️", soon: true, sub: "Renombra, ordena y exporta tu música hacia USB, pendrives o controladores DJ." },
  { id: "dj", label: "DJ", icon: "🎧", soon: "dev", sub: "Tu cabina de DJ integrada: preparar sesiones, hot cues, loops y streaming en directo a YouTube/Twitch." },
  { id: "discogs", label: "Discogs", icon: "💿" },
  { id: "aplicaciones", label: "Aplicaciones", icon: "🧩", soon: true, sub: "Acceso e integración con plataformas de música: YouTube, YouTube Music, SoundCloud, Tidal, Beatport, Beatsource, Juno y más." },
  { id: "blog", label: "Blog", icon: "📝", soon: true, sub: "Novedades, tutoriales y notas técnicas del proyecto." },
  { id: "soporte", label: "Soporte técnico", icon: "🛟", soon: true, sub: "Guías de instalación, configuración y resolución de problemas." },
  { id: "tienda", label: "Tienda música digital", icon: "🛒", soon: true, sub: "Comprar música directamente desde MusicBox (Beatport, Tidal, SoundCloud — sujeto a partnerships)." },
  { id: "produccion", label: "Producción musical", icon: "🎹", soon: true, sub: "Tu próximo paso: crear música desde cero dentro de MusicBox." },
];
let currentSection = "biblioteca";

function buildSidebar() {
  $("#sideNav").innerHTML = SECTIONS.map((s) => `
    <button class="s-item${s.id === currentSection ? " active" : ""}" data-section="${s.id}">
      <span class="si-ic">${s.icon}</span>
      <span class="si-label">${esc(s.label)}</span>
      ${s.soon ? `<span class="si-soon">${s.soon === "dev" ? "En desarrollo" : "Próximamente"}</span>` : ""}
    </button>`).join("");
}
$("#sideNav").addEventListener("click", (e) => {
  const b = e.target.closest("[data-section]");
  if (b) selectSection(b.dataset.section);
});
function openDrawer() { $("#sidebar").classList.add("open"); $("#scrim").classList.add("show"); }
function closeDrawer() { $("#sidebar").classList.remove("open"); $("#scrim").classList.remove("show"); }
$("#hamb").addEventListener("click", openDrawer);
$("#scrim").addEventListener("click", closeDrawer);

function selectSection(id) {
  currentSection = id;
  const sec = SECTIONS.find((s) => s.id === id) || SECTIONS[0];
  document.querySelectorAll(".s-item").forEach((b) => b.classList.toggle("active", b.dataset.section === id));
  $("#sectionTitle").textContent = sec.label;
  $("#stat").style.display = (id === "biblioteca") ? "" : "none";
  if (id === "biblioteca") {
    app.classList.remove("other");
    showView("library");
  } else {
    app.classList.add("other");
    document.querySelectorAll("main.content .view").forEach((v) => v.classList.remove("active"));
    $("#otherView").classList.add("active");
    renderOther(id);
  }
  closeDrawer();
}

function placeholderHTML(sec) {
  const badge = sec.soon === "dev"
    ? `<span class="ph-badge dev">En desarrollo</span>`
    : `<span class="ph-badge">Próximamente</span>`;
  return `<div class="placeholder">
    <div class="ph-ic">${sec.icon}</div>
    <h2>${esc(sec.label)}</h2>
    <p>${esc(sec.sub || "")}</p>
    ${badge}
  </div>`;
}
function renderOther(id) {
  const host = $("#otherView");
  if (id === "discogs") { host.innerHTML = discogsScreenHTML(); initDiscogsScreen(); }
  else if (id === "dj") { host.innerHTML = djConsoleHTML(); initDjConsole(); }
  else { host.innerHTML = placeholderHTML(SECTIONS.find((s) => s.id === id)); }
}

/* ---------- Navigation (tabs internas de Biblioteca) ---------- */
function isWide() {
  return window.matchMedia("(min-width: 760px) and (orientation: landscape), (min-width: 900px)").matches;
}
function showView(name) {
  document.querySelectorAll(".view").forEach((v) => v.classList.remove("active"));
  const el = $("#view-" + name);
  if (el) el.classList.add("active");
  document.querySelectorAll("nav.tabbar button").forEach((b) =>
    b.classList.toggle("active", b.dataset.view === name));
}
document.querySelectorAll("nav.tabbar button").forEach((b) =>
  b.addEventListener("click", () => showView(b.dataset.view)));

/* ---------- Library ---------- */
async function loadLibrary() {
  state.loading = true;
  renderListState();
  const url = `${API}/api/music/library?limit=${LIMIT}&offset=${state.offset}` +
    (state.q ? `&q=${encodeURIComponent(state.q)}` : "");
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    state.tracks = data.tracks || [];
    state.total = data.total || 0;
    state.indexed = data.indexed !== false;
    state.message = data.message || "";
  } catch (err) {
    state.tracks = []; state.total = 0; state.indexed = true;
    state.message = "Error al cargar la biblioteca: " + err.message;
  } finally {
    state.loading = false;
    renderList();
    updateStat();
  }
}

function updateStat() {
  $("#stat").textContent = state.indexed
    ? state.total.toLocaleString("es") + " tracks"
    : "sin indexar";
}

function renderListState() {
  const box = $("#listState");
  if (state.loading) { box.innerHTML = `<div class="empty"><div class="spinner"></div></div>`; }
  else box.innerHTML = "";
}

function renderList() {
  const list = $("#list");
  const box = $("#listState");
  const pager = $("#pager");
  if (state.loading) { list.innerHTML = ""; pager.hidden = true; return; }

  if (!state.indexed) {
    list.innerHTML = "";
    pager.hidden = true;
    box.innerHTML = `<div class="empty"><div class="big">🗂️</div>
      <p>La biblioteca aún no está indexada.</p>
      <p class="note">${esc(state.message || "Ejecuta el indexador para generar la base de datos.")}</p>
      <button class="btn primary" data-ract="reindex" style="margin-top:14px">Indexar biblioteca</button></div>`;
    return;
  }
  if (state.tracks.length === 0) {
    list.innerHTML = "";
    pager.hidden = true;
    box.innerHTML = `<div class="empty"><div class="big">🔎</div>
      <p>${state.q ? "Sin resultados para «" + esc(state.q) + "»." : "No hay tracks todavía."}</p></div>`;
    return;
  }

  box.innerHTML = "";
  list.innerHTML = state.tracks.map((t, i) => `
    <li class="track ${i === state.current ? "playing" : ""}" data-i="${i}">
      <button class="play" data-act="play" data-i="${i}" aria-label="Reproducir">${i === state.current && !audio.paused ? "❚❚" : "▶"}</button>
      <div class="meta" data-act="detail" data-i="${i}">
        <div class="t">${esc(trackTitle(t))}</div>
        <div class="s">${esc(trackSub(t))}</div>
      </div>
      <button class="info" data-act="detail" data-i="${i}" aria-label="Detalle">ⓘ</button>
    </li>`).join("");

  const from = state.total ? state.offset + 1 : 0;
  const to = state.offset + state.tracks.length;
  $("#range").textContent = `${from}–${to} de ${state.total.toLocaleString("es")}`;
  $("#prev").disabled = state.offset === 0;
  $("#next").disabled = state.offset + LIMIT >= state.total;
  pager.hidden = false;
}

$("#list").addEventListener("click", (e) => {
  const el = e.target.closest("[data-act]");
  if (!el) return;
  const i = Number(el.dataset.i);
  if (el.dataset.act === "play") playIndex(i);
  else openDetail(i);
});

/* ---------- Search ---------- */
let searchTimer = null;
$("#q").addEventListener("input", (e) => {
  const v = e.target.value;
  $("#searchBox").classList.toggle("has-value", v.length > 0);
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    state.q = v.trim();
    state.offset = 0;
    loadLibrary();
  }, 250);
});
$("#clearQ").addEventListener("click", () => {
  $("#q").value = ""; $("#searchBox").classList.remove("has-value");
  state.q = ""; state.offset = 0; loadLibrary(); $("#q").focus();
});

/* ---------- Pager ---------- */
$("#prev").addEventListener("click", () => {
  if (state.offset === 0) return;
  state.offset = Math.max(0, state.offset - LIMIT);
  loadLibrary(); scrollTop();
});
$("#next").addEventListener("click", () => {
  if (state.offset + LIMIT >= state.total) return;
  state.offset += LIMIT;
  loadLibrary(); scrollTop();
});
function scrollTop() { $("#view-library").scrollTo({ top: 0, behavior: "smooth" }); }

/* ---------- Reindex ---------- */
async function reindex(btn) {
  if (btn) { btn.disabled = true; btn.textContent = "Indexando…"; }
  $("#listState").innerHTML = `<div class="empty"><div class="spinner"></div><p class="note">Indexando biblioteca…</p></div>`;
  try {
    const res = await fetch(`${API}/api/music/reindex`, { method: "POST" });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || ("HTTP " + res.status));
    state.offset = 0;
    await loadLibrary();
  } catch (err) {
    $("#listState").innerHTML = `<div class="empty"><div class="big">⚠️</div>
      <p class="note err">No se pudo indexar: ${esc(err.message)}</p>
      <button class="btn primary" data-ract="reindex" style="margin-top:14px">Reintentar</button></div>`;
  }
}
document.addEventListener("click", (e) => {
  const el = e.target.closest('[data-ract="reindex"]');
  if (el) reindex(el);
});

/* ---------- Player ---------- */
function playIndex(i) {
  const t = state.tracks[i];
  if (!t || !t.path) return;
  state.current = i;
  state.selected = t;
  audio.src = `${API}/api/music/stream?path=${encodeURIComponent(t.path)}`;
  audio.play().catch(() => {});
  renderPlayer();
  renderList();
  renderMini();
  $("#mini").classList.add("show");
}
function togglePlay() {
  if (!audio.src) { if (state.tracks.length) playIndex(0); return; }
  if (audio.paused) audio.play().catch(() => {}); else audio.pause();
}
function next() { if (state.current + 1 < state.tracks.length) playIndex(state.current + 1); }
function prev() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  if (state.current > 0) playIndex(state.current - 1);
}

function playerHTML() {
  const t = state.selected;
  if (!t) return `<div class="empty"><div class="big">♪</div><p>Elige un track de la biblioteca para reproducir.</p></div>`;
  const playing = !audio.paused && audio.src;
  return `
    <div class="art">♪</div>
    <div class="now">
      <div class="t">${esc(trackTitle(t))}</div>
      <div class="s">${esc(trackSub(t))}</div>
    </div>
    <div class="progress">
      <input class="seek" id="seek" type="range" min="0" max="1000" value="0" />
      <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
    </div>
    <div class="controls">
      <button class="ctl" data-pact="prev" aria-label="Anterior">⏮</button>
      <button class="ctl big" data-pact="toggle" aria-label="Play/Pausa">${playing ? "❚❚" : "▶"}</button>
      <button class="ctl" data-pact="next" aria-label="Siguiente" ${state.current + 1 >= state.tracks.length ? "disabled" : ""}>⏭</button>
    </div>`;
}
function renderPlayer() {
  const html = playerHTML();
  $("#playerFull").innerHTML = html;
  $("#playerFull2").innerHTML = html;
  bindSeek();
  updateProgress();
}
function bindSeek() {
  document.querySelectorAll("#seek").forEach((s) => {
    s.addEventListener("input", () => {
      if (audio.duration) audio.currentTime = (s.value / 1000) * audio.duration;
    });
  });
}
document.addEventListener("click", (e) => {
  const el = e.target.closest("[data-pact]");
  if (!el) return;
  const a = el.dataset.pact;
  if (a === "toggle") togglePlay();
  else if (a === "next") next();
  else if (a === "prev") prev();
});

function renderMini() {
  const t = state.selected;
  $("#miniT").textContent = t ? trackTitle(t) : "—";
  $("#miniS").textContent = t ? trackSub(t) : "";
  $("#miniPlay").textContent = (!audio.paused && audio.src) ? "❚❚" : "▶";
}
$("#miniPlay").addEventListener("click", togglePlay);
$("#miniNext").addEventListener("click", next);
$("#miniPrev").addEventListener("click", prev);

function updateProgress() {
  const ratio = audio.duration ? audio.currentTime / audio.duration : 0;
  document.querySelectorAll("#seek").forEach((s) => { if (document.activeElement !== s) s.value = Math.round(ratio * 1000); });
  const cur = document.querySelectorAll("#cur"), dur = document.querySelectorAll("#dur");
  cur.forEach((e) => e.textContent = fmtTime(audio.currentTime));
  dur.forEach((e) => e.textContent = fmtTime(audio.duration));
  $("#miniBar").style.width = (ratio * 100) + "%";
}
audio.addEventListener("timeupdate", updateProgress);
audio.addEventListener("durationchange", updateProgress);
audio.addEventListener("play", () => { renderMini(); refreshPlayBtns(); });
audio.addEventListener("pause", () => { renderMini(); refreshPlayBtns(); });
audio.addEventListener("ended", next);
function refreshPlayBtns() {
  document.querySelectorAll('[data-pact="toggle"]').forEach((b) => b.textContent = (!audio.paused && audio.src) ? "❚❚" : "▶");
  renderList();
}

/* ---------- Detail ---------- */
function openDetail(i) {
  state.selected = state.tracks[i];
  if (i != null) state.detailIndex = i;
  state.tags = null;
  state.savedMatch = undefined; // undefined = cargando
  state.matchError = null;
  renderDetail();
  if (!isWide()) showView("detail");
  loadTags(state.selected);
  loadSavedMatch(state.selected);
}
function detailHTML(t, tags) {
  if (!t) return `<div class="empty"><div class="big">ⓘ</div><p>Selecciona un track para ver sus detalles.</p></div>`;
  const rows = [
    ["Título", trackTitle(t)],
    ["Artista", t.artist || "—"],
    ["Álbum", t.album || "—"],
    ["Año", t.year || (tags && tags.date) || "—"],
    ["Género", t.genre || "—"],
    ["Formato", (t.extension || "").replace(".", "").toUpperCase() || "—"],
    ["Duración", t.duration_seconds ? fmtTime(t.duration_seconds) : "—"],
    ["Bitrate", t.bitrate ? Math.round(t.bitrate / 1000) + " kbps" : "—"],
    ["Ruta", t.path || "—"],
  ];
  return `
    <div class="card">
      <h3>Metadatos</h3>
      <dl class="kv">${rows.map(([k, v]) => `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join("")}</dl>
    </div>
    <div class="card">
      <h3>Discogs</h3>
      <div id="discogsBox"></div>
    </div>`;
}
function renderDetail() {
  const html = detailHTML(state.selected, state.tags);
  $("#detailBody").innerHTML = html;
  $("#detailBody2").innerHTML = html;
  paintDiscogs();
}
function discogsUri(uri) { return uri ? (uri.startsWith("http") ? uri : "https://www.discogs.com" + uri) : null; }
function scoreLabelEs(note) {
  return ({ strong: "confianza alta", likely: "confianza media", weak: "confianza baja", no_result: "sin resultado", verified_by_user: "verificado" })[note] || note || "";
}
function discogsBoxHTML() {
  if (state.matchError) {
    return `<p class="note err">${esc(state.matchError)}</p>
      <button class="btn" data-dact="match" style="margin-top:10px">Reintentar</button>`;
  }
  if (state.savedMatch === undefined) return `<div class="spinner"></div>`;
  const m = state.savedMatch;
  if (m && m.top_release_id) {
    const uri = discogsUri(m.top_uri);
    const pct = (m.score != null) ? Math.round(m.score * 100) + "%" : "—";
    const badge = m.verified
      ? `<span class="badge" style="border-color:var(--ok);color:var(--ok)">✓ verificado</span>`
      : `<span class="badge">${esc(scoreLabelEs(m.score_note))} · ${pct}</span>`;
    return `<div class="discogs-result">
        <div class="mp-art" style="width:72px;height:72px">♪</div>
        <div>
          <div class="t" style="font-weight:600">${esc(m.top_title || "(sin título)")}</div>
          <div class="note">${esc(m.top_year || "")}</div>
          <div style="margin-top:6px">${badge} <span class="badge">release ${esc(m.top_release_id)}</span>
            ${uri ? ` <a href="${esc(uri)}" target="_blank" rel="noopener">Ver en Discogs ↗</a>` : ""}</div>
        </div>
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" data-dact="match">Actualizar en Discogs</button>
        ${m.verified ? "" : `<button class="btn primary" data-vact="${esc(m.id)}">Marcar verificado</button>`}
      </div>`;
  }
  return `<button class="btn primary" data-dact="match">Buscar match en Discogs</button>
    <p class="note">Consulta la API de Discogs y guarda el resultado localmente.</p>`;
}
function paintDiscogs() {
  const html = discogsBoxHTML();
  document.querySelectorAll("#discogsBox").forEach((b) => b.innerHTML = html);
}
async function loadTags(t) {
  if (!t || !t.path) return;
  try {
    const res = await fetch(`${API}/api/music/tags?path=${encodeURIComponent(t.path)}`);
    if (res.ok) { state.tags = await res.json(); renderDetail(); }
  } catch (_) { /* tags are best-effort */ }
}
async function loadSavedMatch(t) {
  if (!t || !t.path) return;
  state.matchError = null;
  state.savedMatch = undefined;
  paintDiscogs();
  try {
    const res = await fetch(`${API}/api/discogs/matches?path=${encodeURIComponent(t.path)}&limit=1`);
    const data = await res.json();
    state.savedMatch = (data.matches && data.matches[0]) || null;
  } catch (_) {
    state.savedMatch = null;
  }
  paintDiscogs();
}
document.addEventListener("click", (e) => {
  const m = e.target.closest('[data-dact="match"]');
  if (m) { matchDiscogs(); return; }
  const v = e.target.closest("[data-vact]");
  if (v) verifyMatch(v.dataset.vact);
});
async function matchDiscogs() {
  const t = state.selected;
  if (!t || !t.path) return;
  state.matchError = null;
  state.savedMatch = undefined;
  paintDiscogs();
  try {
    const res = await fetch(`${API}/api/discogs/match-file`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ path: t.path }),
    });
    const data = await res.json();
    const resp = data && data.discogs_response;
    if (!res.ok || (resp && resp.error)) {
      const code = (resp && resp.status_code) || res.status;
      state.matchError = `Discogs respondió con error (HTTP ${code}). Revisa el token en .env.`;
      paintDiscogs();
      return;
    }
    await loadSavedMatch(t);
  } catch (err) {
    state.matchError = "No se pudo consultar Discogs: " + err.message;
    paintDiscogs();
  }
}
async function verifyMatch(id) {
  try {
    const res = await fetch(`${API}/api/discogs/matches/${encodeURIComponent(id)}/verify`, { method: "POST" });
    if (res.ok) await loadSavedMatch(state.selected);
  } catch (_) { /* ignore */ }
}

/* ---------- Pantalla Discogs (sección dedicada) ---------- */
function discogsScreenHTML() {
  return `<div class="screen">
    <div class="dsearch-row">
      <div class="search" id="dSearchBox">
        <span aria-hidden="true">🔍</span>
        <input id="dq" type="search" inputmode="search" placeholder="Buscar en Discogs: artista, álbum, release…" autocomplete="off" />
      </div>
      <button class="btn primary" id="dqBtn">Buscar</button>
    </div>
    <div id="dResults"></div>
    <h3>Matches guardados</h3>
    <div id="dMatches"><div class="empty"><div class="spinner"></div></div></div>
  </div>`;
}
function initDiscogsScreen() {
  const input = $("#dq");
  $("#dqBtn").addEventListener("click", doDiscogsSearch);
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") doDiscogsSearch(); });
  $("#dMatches").addEventListener("click", (e) => {
    const v = e.target.closest("[data-vmatch]");
    if (v) verifyMatchScreen(v.dataset.vmatch);
  });
  loadDiscogsMatchesList();
  if (isWide()) input.focus();
}
async function doDiscogsSearch() {
  const q = $("#dq").value.trim();
  const box = $("#dResults");
  if (!q) { box.innerHTML = ""; return; }
  box.innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
  try {
    const res = await fetch(`${API}/api/discogs/search?type=release&per_page=12&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    if (!res.ok || data.error) {
      const code = (data && data.status_code) || res.status;
      box.innerHTML = `<p class="note err">Discogs respondió con error (HTTP ${esc(code)}). Revisa el token en .env.</p>`;
      return;
    }
    const results = (data.data && data.data.results) || [];
    if (!results.length) { box.innerHTML = `<div class="empty"><div class="big">🔎</div><p>Sin resultados para «${esc(q)}».</p></div>`; return; }
    box.innerHTML = results.map((r) => {
      const thumb = r.cover_image || r.thumb || "";
      const uri = discogsUri(r.uri);
      const fmt = r.format ? "· " + esc([].concat(r.format).join(", ")) : "";
      return `<div class="dresult">
          ${thumb ? `<img src="${esc(thumb)}" alt="" referrerpolicy="no-referrer" />` : `<div class="mp-art" style="width:56px;height:56px">♪</div>`}
          <div style="min-width:0">
            <div class="t" style="font-weight:600">${esc(r.title || "(sin título)")}</div>
            <div class="note">${esc(r.year || "")} ${fmt}</div>
            <div style="margin-top:6px"><span class="badge">${esc(r.type || "release")} ${esc(r.id || "")}</span>
              ${uri ? ` <a href="${esc(uri)}" target="_blank" rel="noopener">Ver ↗</a>` : ""}</div>
          </div>
        </div>`;
    }).join("");
  } catch (err) {
    box.innerHTML = `<p class="note err">No se pudo consultar Discogs: ${esc(err.message)}</p>`;
  }
}
async function loadDiscogsMatchesList() {
  const box = $("#dMatches");
  if (!box) return;
  box.innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
  try {
    const res = await fetch(`${API}/api/discogs/matches?limit=25`);
    const data = await res.json();
    const items = data.matches || [];
    if (!items.length) { box.innerHTML = `<p class="note">Todavía no hay matches guardados. Haz matching desde el Detalle de un track.</p>`; return; }
    box.innerHTML = items.map((m) => {
      const pct = (m.score != null) ? Math.round(m.score * 100) + "%" : "—";
      const badge = m.verified
        ? `<span class="badge" style="border-color:var(--ok);color:var(--ok)">✓ verificado</span>`
        : `<span class="badge">${esc(scoreLabelEs(m.score_note))} · ${pct}</span>`;
      const fname = (m.file_path || "").split(/[\\/]/).pop();
      const uri = discogsUri(m.top_uri);
      return `<div class="dmatch">
          <div class="t" style="font-weight:600">${esc(m.top_title || "(sin coincidencia)")}</div>
          <div class="note">${esc(fname || "")}</div>
          <div style="margin-top:8px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">${badge}
            ${m.top_release_id ? `<span class="badge">release ${esc(m.top_release_id)}</span>` : ""}
            ${uri ? `<a href="${esc(uri)}" target="_blank" rel="noopener">Ver ↗</a>` : ""}
            ${m.verified ? "" : `<button class="btn" data-vmatch="${esc(m.id)}" style="padding:6px 12px">Verificar</button>`}
          </div>
        </div>`;
    }).join("");
  } catch (err) {
    box.innerHTML = `<p class="note err">No se pudieron cargar los matches: ${esc(err.message)}</p>`;
  }
}
async function verifyMatchScreen(id) {
  try {
    const res = await fetch(`${API}/api/discogs/matches/${encodeURIComponent(id)}/verify`, { method: "POST" });
    if (res.ok) loadDiscogsMatchesList();
  } catch (_) { /* ignore */ }
}

function toggleDjFullscreen() {
  const el = $("#otherView").querySelector(".dj");
  if (!el) return;
  try {
    if (!document.fullscreenElement) {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) req.call(el);
    } else {
      document.exitFullscreen();
    }
  } catch (_) { /* fullscreen no disponible */ }
}
function initDjConsole() {
  const dj = $("#otherView").querySelector(".dj");
  if (!dj) return;
  const full = dj.querySelector("#djFull");
  if (full) full.addEventListener("click", toggleDjFullscreen);
  dj.addEventListener("click", (e) => {
    const b = e.target.closest("[data-dj]");
    if (!b) return;
    if (b.dataset.dj === "pad") {
      b.classList.toggle("on");
    } else if (b.dataset.dj === "play") {
      b.classList.toggle("on");
      b.textContent = b.classList.contains("on") ? "❚❚" : "▶";
    } else if (b.dataset.dj === "cue") {
      b.classList.add("flash");
      setTimeout(() => b.classList.remove("flash"), 160);
    }
  });
}
